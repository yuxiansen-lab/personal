<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure | [XiansenYu]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --main: #1a1a1a;
            --sub: #86868b;
            --accent: #0071e3;
            --line: #efeff0;
            --bezier: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --main: #f5f5f7;
                --sub: #6e6e73;
                --line: #1c1c1e;
                --accent: #2997ff;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.8s var(--bezier);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .serif { font-family: 'Noto Serif SC', serif; }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 18vh 30px 10vh;
        }

        /* --- 核心动画：入场 --- */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1s var(--bezier) forwards;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 动态 # 号：点击激活逻辑 --- */
        .interactive-area {
            position: relative;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hash-tag {
            position: absolute;
            left: -25px;
            color: var(--accent);
            font-weight: 300;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.4s var(--bezier);
            pointer-events: none;
        }

        /* 激活态样式 */
        .is-active .hash-tag {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- 文字排版 --- */
        header { margin-bottom: 12vh; }
        h1 { font-size: clamp(2rem, 7vw, 2.8rem); line-height: 1.3; font-weight: 500; }

        .philosophy { margin-bottom: 12vh; }
        .philosophy blockquote {
            font-size: 1.3rem;
            margin: 20px 0;
            padding-left: 20px;
            border-left: 1px solid var(--line);
        }

        /* --- 纯文字联系方式 --- */
        .contact-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .contact-item {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: opacity 0.3s;
        }

        .contact-item:active { opacity: 0.5; }

        .label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--sub);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.05rem;
            font-weight: 400;
        }

        footer {
            margin-top: 15vh;
            font-size: 0.75rem;
            color: var(--sub);
        }

        @media (max-width: 600px) {
            .hash-tag { left: -20px; }
            .container { padding-top: 12vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="reveal">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <h1 class="serif">万物皆有裂痕，<br>那是光照进来的地方。</h1>
            </div>
            <p style="color: var(--sub); margin-top: 20px;">我是 XiansenYu，独立开发者。</p>
        </header>

        <section class="philosophy reveal" style="animation-delay: 0.2s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">PHILOSOPHY</span>
            </div>
            <blockquote class="serif">“美不是往上增添，<br>而是当无法再减少时的纯粹。”</blockquote>
        </section>

        <section class="reveal" style="animation-delay: 0.4s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">CONNECTION</span>
            </div>
            
            <div class="contact-list">
                <a href="mailto:yuxiansen@my.com" class="contact-item">
                    <span class="label">Email</span>
                    <span class="value">yuxiansen@my.com</span>
                </a>
                <a href="https://github.com/yuxiansen-lab/" class="contact-item">
                    <span class="label">GitHub</span>
                    <span class="value">@yuxiansen-lab</span>
                </a>
                <a href="https://x.com/YuYxsen" class="contact-item">
                    <span class="label">X</span>
                    <span class="value">Xiansen Yu</span>
                </a>
            </div>
        </section>

        <footer class="reveal" style="animation-delay: 0.6s;">
            <p>© 2026 Crafted with Intention.</p>
        </footer>
    </div>

    <script>
        function handleActive(el) {
            // 1. 寻找当前已经激活的元素
            const currentActive = document.querySelector('.is-active');
            
            // 2. 如果点击的是同一个已经激活的，就关掉它
            if (currentActive === el) {
                el.classList.remove('is-active');
            } else {
                // 3. 如果点击的是新的，先关掉旧的，再开启新的
                if (currentActive) {
                    currentActive.classList.remove('is-active');
                }
                el.classList.add('is-active');
            }
        }
    </script>
</body>
</html>
