<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure | [你的名字]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --main: #1a1a1a;
            --sub: #86868b;
            --accent: #0071e3;
            --line: #efeff0;
            --bezier: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --main: #f5f5f7;
                --sub: #6e6e73;
                --line: #1c1c1e;
                --accent: #2997ff;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.8s var(--bezier);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .serif { font-family: 'Noto Serif SC', serif; }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 18vh 30px 10vh;
        }

        /* --- 动画：入场 --- */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1s var(--bezier) forwards;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 动态 # 号 --- */
        .interactive-area {
            position: relative;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hash-tag {
            position: absolute;
            left: -25px;
            color: var(--accent);
            font-weight: 300;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.4s var(--bezier);
            pointer-events: none;
        }

        .is-active .hash-tag {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- 文字排版 --- */
        header { margin-bottom: 10vh; }
        h1 { font-size: clamp(2rem, 7vw, 2.8rem); line-height: 1.3; font-weight: 500; }

        .philosophy { margin-bottom: 10vh; }
        .philosophy blockquote {
            font-size: 1.3rem;
            margin: 20px 0;
            padding-left: 20px;
            border-left: 1px solid var(--line);
        }

        /* --- 联系与赞助列表 --- */
        .list-stack {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .item {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--sub);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value { font-size: 1.05rem; transition: color 0.3s; }
        .item:active .value { color: var(--accent); }

        /* --- 赞助抽屉效果 --- */
        .sponsor-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s var(--bezier), margin-top 0.5s var(--bezier);
            border-left: 1px solid var(--line);
            padding-left: 20px;
            margin-top: 0;
        }

        /* 当父级激活时展开 */
        .is-active + .sponsor-drawer {
            max-height: 200px;
            margin-top: 15px;
        }

        .drawer-content {
            font-size: 0.9rem;
            color: var(--sub);
            padding: 10px 0;
        }

        .drawer-content b { color: var(--main); font-weight: 400; }

        footer {
            margin-top: 15vh;
            font-size: 0.75rem;
            color: var(--sub);
        }

        @media (max-width: 600px) {
            .hash-tag { left: -20px; }
            .container { padding-top: 12vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="reveal">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <h1 class="serif">万物皆有裂痕，<br>那是光照进来的地方。</h1>
            </div>
            <p style="color: var(--sub); margin-top: 20px;">我是 [你的名字]。</p>
        </header>

        <section class="philosophy reveal" style="animation-delay: 0.2s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">PHILOSOPHY</span>
            </div>
            <blockquote class="serif">“美不是往上增添，<br>而是当无法再减少时的纯粹。”</blockquote>
        </section>

        <section class="reveal" style="animation-delay: 0.4s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">CONNECTION</span>
            </div>
            
            <div class="list-stack">
                <a href="mailto:hello@example.com" class="item">
                    <span class="label">Email</span>
                    <span class="value">hello@yourworld.com</span>
                </a>
                
                <div class="item-group">
                    <div class="interactive-area" onclick="handleActive(this)">
                        <span class="hash-tag">#</span>
                        <div class="item" style="cursor: pointer;">
                            <span class="label">Support</span>
                            <span class="value">赞助我的创作</span>
                        </div>
                    </div>
                    <div class="sponsor-drawer">
                        <div class="drawer-content">
                            如果我的作品对你有帮助，欢迎请我喝杯咖啡。<br><br>
                            微信/支付宝：<b>yourname@account</b><br>
                            或是通过 <b>Ko-fi / Patreon</b> 关注我。
                        </div>
                    </div>
                </div>

                <a href="#" class="item">
                    <span class="label">GitHub</span>
                    <span class="value">@username</span>
                </a>
            </div>
        </section>

        <footer class="reveal" style="animation-delay: 0.6s;">
            <p>© 2026 Crafted with Intention.</p>
        </footer>
    </div>

    <script>
        function handleActive(el) {
            const currentActive = document.querySelector('.is-active');
            
            if (currentActive === el) {
                el.classList.remove('is-active');
            } else {
                if (currentActive) {
                    currentActive.classList.remove('is-active');
                }
                el.classList.add('is-active');
            }
        }
    </script>
</body>
</html>
