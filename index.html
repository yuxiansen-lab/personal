<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiet | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --bg: #ffffff;
            --main: #1a1a1a;
            --sub: #86868b;
            --accent: #0071e3;
            --line: #f2f2f7;
            --apple-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
            --modal-ease: cubic-bezier(0.3, 1, 0.2, 1);
        }


        body.theme-dark {
            --bg: #000000;
            --main: #f5f5f7;
            --sub: #86868b;
            --line: #1c1c1e;
        }


        @media (prefers-color-scheme: dark) {
            body:not(.theme-light) {
                --bg: #000000;
                --main: #f5f5f7;
                --sub: #86868b;
                --line: #1c1c1e;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 1s var(--apple-ease), color 1s var(--apple-ease);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .serif { font-family: 'Noto Serif SC', serif; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15vh 30px 10vh;
        }


        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: appleReveal 1.2s var(--apple-ease) forwards;
        }
        @keyframes appleReveal { to { opacity: 1; transform: translateY(0); } }


        .meta-header {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--sub);
            text-transform: uppercase;
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.5s var(--apple-ease), color 0.3s;
        }
        .theme-toggle:active { transform: scale(0.8) rotate(180deg); }
        .theme-toggle:hover { color: var(--main); }


        .interactive-area {
            position: relative;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s var(--apple-ease);
        }
        .interactive-area:active { transform: scale(0.98); }

        .hash-tag {
            position: absolute; left: -28px; color: var(--accent);
            font-weight: 300; opacity: 0; transform: translateX(8px);
            transition: all 0.4s var(--apple-ease);
        }
        .is-active .hash-tag { opacity: 1; transform: translateX(0); }


        header { margin-bottom: 12vh; }
        h1 { font-size: clamp(2rem, 7vw, 2.8rem); line-height: 1.3; font-weight: 500; letter-spacing: -0.02em; }

        .philosophy { margin-bottom: 12vh; }
        .philosophy blockquote {
            font-size: 1.4rem; margin: 25px 0; padding-left: 20px;
            border-left: 1px solid var(--line);
            transition: border-color 1s var(--apple-ease);
        }


        .contact-list { margin-top: 30px; display: flex; flex-direction: column; gap: 32px; }
        .contact-item { text-decoration: none; color: inherit; display: block; cursor: pointer; }
        
        .label { display: block; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1.1rem; font-weight: 400; transition: opacity 0.3s var(--apple-ease); }
        .contact-item:active .value { opacity: 0.4; }


        #full-sponsor {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--bg);
            color: var(--main);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 初始状态在屏幕正下方 */
            transform: translateY(100vh);
            transition: transform 0.8s var(--modal-ease), background-color 1s var(--apple-ease);
            will-change: transform;
        }

        #full-sponsor.active { transform: translateY(0); }

        .sponsor-inner { text-align: center; }

        .qr-placeholder {
            width: 200px; height: 200px;
            margin: 0 auto 40px;
            background: #f5f5f7;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; font-size: 11px; letter-spacing: 0.1em;
        }

        .close-curtain {
            margin-top: 60px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--sub);
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-curtain:hover { color: var(--main); }

        footer { margin-top: 15vh; font-size: 0.75rem; color: var(--sub); }

        @media (max-width: 600px) {
            .hash-tag { left: -22px; }
            .container { padding-top: 12vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="meta-header reveal">
            <span id="clock">00:00:00</span>
            <span class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">○</span>
        </div>

        <header class="reveal" style="animation-delay: 0.1s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <h1 class="serif">塑造逻辑，<br>也塑造留白。</h1>
            </div>

            <p style="color: var(--sub); margin-top: 30px; font-size: 1.1rem;">我是 俞先森 ，一名前端程序员。</p>
        </header>

        <section class="philosophy reveal" style="animation-delay: 0.2s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">PHILOSOPHY</span>
            </div>
            <blockquote class="serif">“美不是往上增添，<br>而是当无法再减少时的纯粹。”</blockquote>
        </section>

        <section class="reveal" style="animation-delay: 0.3s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">CONNECTION</span>
            </div>
            
            <div class="contact-list">
                <a href="mailto:yuxiansen@my.com" class="contact-item">
                    <span class="label">Email</span>
                    <span class="value">yuxiansen@my.com</span>
                </a>

                <a href="https://github.com/yuxiansen-lab" class="contact-item">
                    <span class="label">Github</span>
                    <span class="value">yuxiansen-lab</span>
                </a>

                <div class="contact-item" onclick="openSponsor()">
                    <span class="label">Support</span>
                    <span class="value">赞助我的创作</span>
                </div>

                <div class="contact-item" onclick="copyLink(this)">
                    <span class="label">Share</span>
                    <span class="value" id="share-text">复制主页链接</span>
                </div>
            </div>
        </section>

        <footer class="reveal" style="animation-delay: 0.4s;">
            <p>© 2026 Crafted with Intention.</p>
        </footer>
    </div>

    <div id="full-sponsor">
        <div class="sponsor-inner">
            <div class="qr-placeholder">
                <img src="/PayQrcode.png" alt="QR CODE">
                </div>
            <p class="serif" style="font-size: 1.2rem; margin-bottom: 8px;">感谢这份认可</p>
            <p style="font-size: 0.85rem; color: var(--sub);">保持简单，保持纯粹</p>
            <div class="close-curtain" onclick="closeSponsor()">Dismiss — 关闭</div>
        </div>
    </div>

    <script>

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();


        function toggleTheme() {
            const body = document.body;
            const toggleIcon = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('theme-dark')) {
                body.classList.remove('theme-dark');
                body.classList.add('theme-light');
                toggleIcon.innerText = '○';
            } else if (body.classList.contains('theme-light')) {
                body.classList.remove('theme-light');
                body.classList.add('theme-dark');
                toggleIcon.innerText = '●';
            } else {

                const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (isSystemDark) {
                    body.classList.add('theme-light');
                    toggleIcon.innerText = '○';
                } else {
                    body.classList.add('theme-dark');
                    toggleIcon.innerText = '●';
                }
            }
        }


        function handleActive(el) {
            const currentActive = document.querySelector('.is-active');
            if (currentActive === el) {
                el.classList.remove('is-active');
            } else {
                if (currentActive) currentActive.classList.remove('is-active');
                el.classList.add('is-active');
            }
        }

        function openSponsor() {
            document.getElementById('full-sponsor').classList.add('active');
            const currentActive = document.querySelector('.is-active');
            if (currentActive) currentActive.classList.remove('is-active');
        }

        function closeSponsor() {
            document.getElementById('full-sponsor').classList.remove('active');
        }

        function copyLink(el) {
            const shareText = document.getElementById('share-text');
            const originalText = shareText.innerText;
            
            if (originalText === '已复制 Link Copied') return; 

            navigator.clipboard.writeText(window.location.href).then(() => {
                shareText.style.opacity = '0';
                setTimeout(() => {
                    shareText.innerText = '已复制 Link Copied';
                    shareText.style.color = 'var(--accent)';
                    shareText.style.opacity = '1';
                    
                    setTimeout(() => {
                        shareText.style.opacity = '0';
                        setTimeout(() => {
                            shareText.innerText = '复制主页链接';
                            shareText.style.color = 'inherit';
                            shareText.style.opacity = '1';
                        }, 300);
                    }, 2000);
                }, 300);
            });
        }
    </script>
</body>
</html>
