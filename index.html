<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure | XiansenYu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --main: #1a1a1a;
            --sub: #86868b;
            --accent: #0071e3;
            --line: #efeff0;
            --bezier: cubic-bezier(0.4, 0, 0.2, 1);
            --overlay: rgba(255, 255, 255, 0.95);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --main: #f5f5f7;
                --sub: #6e6e73;
                --line: #1c1c1e;
                --accent: #2997ff;
                --overlay: rgba(0, 0, 0, 0.95);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.8s var(--bezier);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .serif { font-family: 'Noto Serif SC', serif; }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 18vh 30px 10vh;
        }

        /* --- 动画：入场 --- */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1s var(--bezier) forwards;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 动态 # 号 --- */
        .interactive-area {
            position: relative;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
        }

        .hash-tag {
            position: absolute; left: -25px; color: var(--accent);
            font-weight: 300; opacity: 0; transform: translateX(10px);
            transition: all 0.4s var(--bezier); pointer-events: none;
        }

        .is-active .hash-tag { opacity: 1; transform: translateX(0); }

        /* --- 排版 --- */
        header { margin-bottom: 10vh; }
        h1 { font-size: clamp(2rem, 7vw, 2.8rem); line-height: 1.3; font-weight: 500; }
        
        .philosophy { margin-bottom: 10vh; }
        .philosophy blockquote {
            font-size: 1.3rem; margin: 20px 0; padding-left: 20px;
            border-left: 1px solid var(--line);
        }

        /* --- 联系列表 --- */
        .list-stack { display: flex; flex-direction: column; gap: 25px; }
        .item { text-decoration: none; color: inherit; display: block; cursor: pointer; }
        .label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1.05rem; }

        /* --- 支付浮层 (Overlay) --- */
        #payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s var(--bezier);
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #payment-modal.show { opacity: 1; pointer-events: auto; }

        .qr-container {
            width: 200px; height: 200px;
            background: #f5f5f7; /* 浅灰色底块 */
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            /* 这里你可以把图片换成你处理过的黑白二维码 */
            border: 1px solid var(--line);
        }

        .qr-container img { width: 85%; height: 85%; filter: grayscale(1); opacity: 0.8; }

        .close-btn {
            font-size: 0.8rem; letter-spacing: 0.2em; color: var(--sub);
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }

        footer { margin-top: 15vh; font-size: 0.75rem; color: var(--sub); }

        @media (max-width: 600px) { .hash-tag { left: -20px; } }
        
        .google-sans {
              font-family: "Google Sans", sans-serif;
              font-optical-sizing: auto;
              font-weight: <weight>;
              font-style: normal;
              font-variation-settings:
              "GRAD" 0;
        }
        
    </style>
</head>
<body>

    <div class="container">
        <header class="reveal">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <h1 class="serif">万物皆有裂痕，<br>那是光照进来的地方。</h1>
            </div>
                    <p style="color: var(--sub); margin-top: 30px; font-size: 1.1rem;">我是 俞先森 ，一名前端程序员。</p>
        </header>

        <section class="philosophy reveal" style="animation-delay: 0.2s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">PHILOSOPHY</span>
            </div>
            <blockquote class="serif">“美不是往上增添，<br>而是当无法再减少时的纯粹。”</blockquote>
        </section>

        <section class="reveal" style="animation-delay: 0.4s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.2em; color: var(--sub);">CONNECTION</span>
            </div>
            
            <div class="list-stack">
                <a href="mailto:yuxiansen@my.com" class="item">
                    <span class="label google-sans">Email</span>
                    <span class="value google-sans">yuxiansen@my.com</span>
                </a>

                <div class="item" onclick="openSponsor()">
                    <span class="label">Support</span>
                    <span class="value">赞助我的创作</span>
                </div>

                <a href="https://github.com/yuxiansen-lab" class="item">
                    <span class="label google-sans ">GitHub</span>
                    <span class="value google-sans ">@yuxiansen-lab</span>
                </a>
            </div>
        </section>

        <footer class="reveal google-sans" style="animation-delay: 0.6s;">
            <p>© 2026 Crafted with Intention.</p>
        </footer>
    </div>

    <div id="payment-modal" onclick="closeSponsor()">
        <div class="qr-container" onclick="event.stopPropagation()">
            <img src="/PayQrcode.png" alt="QR Code">
        </div>
        <p class="serif" style="font-size: 0.9rem;">感谢支持这份纯粹</p>
        <div class="close-btn">Close / 关闭</div>
    </div>

    <script>
        function handleActive(el) {
            const currentActive = document.querySelector('.is-active');
            if (currentActive === el) {
                el.classList.remove('is-active');
            } else {
                if (currentActive) currentActive.classList.remove('is-active');
                el.classList.add('is-active');
            }
        }

        function openSponsor() {
            document.getElementById('payment-modal').classList.add('show');
        }

        function closeSponsor() {
            document.getElementById('payment-modal').classList.remove('show');
        }
    </script>
</body>
</html>
