<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiet | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --main: #1a1a1a;
            --sub: #86868b;
            --accent: #0071e3;
            --line: #f2f2f7;
            --apple-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
            --modal-ease: cubic-bezier(0.32, 1, 0.24, 1);
        }

        /* 统一黑暗模式类 */
        body.dark {
            --bg: #000000;
            --main: #f5f5f7;
            --sub: #86868b;
            --line: #1c1c1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--main);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color 0.8s var(--apple-ease), color 0.8s var(--apple-ease);
            line-height: 1.6;
            overflow-x: hidden;
            /* 防止弹窗时抖动 */
            height: 100%;
        }

        /* 锁定背景滚动 */
        body.locked { overflow: hidden; }

        .serif { font-family: 'Noto Serif SC', serif; }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 12vh 30px 10vh;
        }

        /* 渐进显现动画 */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            animation: appleReveal 1.2s var(--apple-ease) forwards;
        }
        @keyframes appleReveal { to { opacity: 1; transform: translateY(0); } }

        .meta-header {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--sub);
            text-transform: uppercase;
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-toggle {
            cursor: pointer;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: flex-end;
            font-size: 16px;
            transition: transform 0.5s var(--apple-ease);
        }
        .theme-toggle:active { transform: scale(0.8); }

        /* 交互区 */
        .interactive-area {
            position: relative;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 8px;
        }

        .hash-tag {
            position: absolute; left: -28px; color: var(--accent);
            font-weight: 300; opacity: 0; transform: translateX(8px);
            transition: all 0.4s var(--apple-ease);
        }
        .is-active .hash-tag { opacity: 1; transform: translateX(0); }

        header { margin-bottom: 10vh; }
        h1 { font-size: clamp(2rem, 7vw, 2.8rem); line-height: 1.25; font-weight: 500; letter-spacing: -0.02em; }

        .philosophy { margin-bottom: 10vh; }
        .philosophy blockquote {
            font-size: 1.35rem; margin: 24px 0; padding-left: 20px;
            border-left: 1px solid var(--line);
            transition: border-color 0.8s var(--apple-ease);
        }

        /* 列表部分 */
        .contact-list { display: flex; flex-direction: column; gap: 32px; }
        .contact-item { text-decoration: none; color: inherit; display: block; }
        
        .label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; color: var(--sub); text-transform: uppercase; margin-bottom: 6px; }
        .value { font-size: 1.1rem; font-weight: 400; transition: opacity 0.3s var(--apple-ease); }
        .contact-item:active .value { opacity: 0.4; }

        /* 全屏幕布：修复层级和溢出 */
        #full-sponsor {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center; justify-content: center;
            transform: translateY(100%);
            transition: transform 0.8s var(--modal-ease);
            /* 解决移动端点击穿透 */
            pointer-events: none;
        }

        #full-sponsor.active { 
            transform: translateY(0); 
            pointer-events: auto;
        }

        .sponsor-inner { 
            text-align: center; 
            width: 100%;
            padding: 40px;
        }

        .qr-placeholder {
            width: 220px; height: 220px;
            margin: 0 auto 32px;
            background: #f5f5f7;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            border: 1px solid var(--line);
        }
        
        .qr-placeholder img {
            width: 85%; height: 85%;
            object-fit: contain;
            /* 黑白滤镜增强高级感 */
            filter: grayscale(1);
            mix-blend-mode: multiply;
        }

        .close-curtain {
            margin-top: 48px;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--sub);
            text-transform: uppercase;
            cursor: pointer;
            padding: 10px;
        }

        footer { margin-top: 15vh; font-size: 0.75rem; color: var(--sub); opacity: 0.8; }

        @media (max-width: 600px) {
            .hash-tag { display: none; } /* 移动端去掉悬浮的 # 避免排版问题 */
            .container { padding-top: 10vh; }
        }
    </style>
</head>
<body id="body">

    <div class="container">
        <div class="meta-header reveal">
            <span id="clock">00:00:00</span>
            <span class="theme-toggle" onclick="toggleTheme()">○</span>
        </div>

        <header class="reveal" style="animation-delay: 0.1s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <h1 class="serif">塑造逻辑，<br>也塑造留白。</h1>
            </div>
            <p style="color: var(--sub); margin-top: 24px; font-size: 1.05rem;">我是 <span style="color:var(--main)">俞先森</span>，一名前端程序员。</p>
        </header>

        <section class="philosophy reveal" style="animation-delay: 0.2s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span class="label">Philosophy</span>
            </div>
            <blockquote class="serif">“美不是往上增添，<br>而是当无法再减少时的纯粹。”</blockquote>
        </section>

        <section class="reveal" style="animation-delay: 0.3s;">
            <div class="interactive-area" onclick="handleActive(this)">
                <span class="hash-tag">#</span>
                <span class="label">Connection</span>
            </div>
            
            <div class="contact-list">
                <a href="mailto:yuxiansen@my.com" class="contact-item">
                    <span class="label">Email</span>
                    <span class="value">yuxiansen@my.com</span>
                </a>

                <a href="https://github.com/yuxiansen-lab" target="_blank" class="contact-item">
                    <span class="label">Github</span>
                    <span class="value">yuxiansen-lab</span>
                </a>

                <div class="contact-item" onclick="openSponsor()">
                    <span class="label">Support</span>
                    <span class="value">赞助我的创作</span>
                </div>

                <div class="contact-item" onclick="copyLink(this)">
                    <span class="label">Share</span>
                    <span class="value" id="share-text">复制主页链接</span>
                </div>
            </div>
        </section>

        <footer class="reveal" style="animation-delay: 0.4s;">
            <p>© 2026 Crafted with Intention.</p>
        </footer>
    </div>

    <div id="full-sponsor">
        <div class="sponsor-inner">
            <div class="qr-placeholder">
                <img src="/PayQrcode.png" alt="QR CODE" onerror="this.style.display='none';this.parentNode.innerText='QR CODE MISSING'">
            </div>
            <p class="serif" style="font-size: 1.2rem; margin-bottom: 8px;">感谢这份认可</p>
            <p style="font-size: 0.85rem; color: var(--sub);">保持简单，保持纯粹</p>
            <div class="close-curtain" onclick="closeSponsor()">Dismiss — 关闭</div>
        </div>
    </div>

    <script>
        // 初始化时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 主题切换：逻辑修复
        function toggleTheme() {
            const body = document.body;
            const toggleIcon = document.querySelector('.theme-toggle');
            
            body.classList.toggle('dark');
            
            if (body.classList.contains('dark')) {
                toggleIcon.innerText = '●';
                localStorage.setItem('theme', 'dark');
            } else {
                toggleIcon.innerText = '○';
                localStorage.setItem('theme', 'light');
            }
        }

        // 恢复用户主题偏好
        if (localStorage.getItem('theme') === 'dark' || 
           (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').innerText = '●';
        }

        // 交互激活
        function handleActive(el) {
            const currentActive = document.querySelector('.is-active');
            if (currentActive === el) {
                el.classList.remove('is-active');
            } else {
                if (currentActive) currentActive.classList.remove('is-active');
                el.classList.add('is-active');
            }
        }

        // 弹窗逻辑：增加滚动锁定
        const sponsorModal = document.getElementById('full-sponsor');
        function openSponsor() {
            sponsorModal.classList.add('active');
            document.body.classList.add('locked');
            const currentActive = document.querySelector('.is-active');
            if (currentActive) currentActive.classList.remove('is-active');
        }

        function closeSponsor() {
            sponsorModal.classList.remove('active');
            document.body.classList.remove('locked');
        }

        // 优雅分享
        function copyLink(el) {
            const shareText = document.getElementById('share-text');
            if (shareText.innerText.includes('Copied')) return; 

            navigator.clipboard.writeText(window.location.href).then(() => {
                const originalText = shareText.innerText;
                shareText.style.opacity = '0';
                
                setTimeout(() => {
                    shareText.innerText = '已复制 Link Copied';
                    shareText.style.color = 'var(--accent)';
                    shareText.style.opacity = '1';
                    
                    setTimeout(() => {
                        shareText.style.opacity = '0';
                        setTimeout(() => {
                            shareText.innerText = originalText;
                            shareText.style.color = 'inherit';
                            shareText.style.opacity = '1';
                        }, 300);
                    }, 2000);
                }, 300);
            });
        }
    </script>
</body>
</html>
